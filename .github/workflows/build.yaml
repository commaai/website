name: Build

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  checks: write
  contents: read
  pull-requests: write

env:
  HUGO_VERSION: 0.147.8

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          curl -sL "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" | tar xz hugo
          sudo mv hugo /usr/local/bin/hugo

      - if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        name: Build (production)
        run: hugo --gc --cleanDestinationDir
        env:
          HUGO_PARAMS_SHOPIFY_STOREFRONTAPITOKEN: ${{ secrets.VITE_SHOPIFY_STOREFRONT_API_TOKEN }}

      - if: github.event_name == 'pull_request' || github.ref != 'refs/heads/master'
        name: Build (development)
        run: hugo --gc --cleanDestinationDir

      - name: Upload built project
        uses: actions/upload-artifact@v4
        with:
          path: ./build
          overwrite: true
          retention-days: 1
          name: build-artifacts-${{ github.run_id }}

      - name: Deploy to prod
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository == 'commaai/website'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMMA_WEB }}
          channelId: live
          projectId: comma-web
