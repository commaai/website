baseURL = 'https://comma.ai/'
languageCode = 'en'
title = 'comma.ai — make driving chill'
publishDir = 'build'
uglyURLs = true
disableKinds = ['taxonomy', 'term', 'RSS', 'sitemap', 'robotsTXT']
disableHugoGeneratorInject = true
enableRobotsTXT = false
disableLiveReload = false
capitalizeListTitles = false
enableInlineShortcodes = true

[params]
  vehicleRoundTo = 25

# Public Shopify Storefront credentials (dev store; production token is
# injected in CI via HUGO_PARAMS_SHOPIFY_STOREFRONTAPITOKEN)
[params.shopify]
  apiVersion = '2025-01'
  storeUrl = 'comma-dev.myshopify.com'
  storefrontApiToken = 'ee9baaeb9964250671e3abe92cef70e6'

[caches]
  [caches.getresource]
    maxAge = '1h'

[minify]
  disableHTML = true

[markup.goldmark.renderer]
  unsafe = true
